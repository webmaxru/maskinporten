name: Deploy wizard (Azure Static Web Apps)

on:
  push:
    branches: [main]
    paths:
      - 'apps/wizard/**'
      - 'packages/scopes-catalogue/**'
      - '.github/workflows/swa-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter maskinporten-scopes build
      - run: pnpm --filter @wizard/site build
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: apps/wizard/dist
          skip_app_build: true
