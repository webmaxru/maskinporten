name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm trusted publishing (OIDC) + automatic provenance

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      # Creates a "Version Packages" PR when there are changesets, and publishes
      # to npm via OIDC trusted publishing (no token) once that PR is merged.
      # Provenance is generated automatically by trusted publishing.
      # NOTE: trusted publishing cannot create a brand-new package name — the
      # first publish of each package must be bootstrapped once (locally or with
      # a temporary token); every release after that is tokenless.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
